<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Soundwave</title>
    <meta name="description" content="Soundwave — Your personal music streaming player powered by YouTube" />
    <meta name="keywords" content="music, player, soundwave, youtube, streaming, playlist" />
    <meta name="theme-color" content="#7ed0ec" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/android-chrome-512x512.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Soundwave" />

    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Soundwave" />

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-config" content="none" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Soundwave" />
    <meta property="og:description" content="Your personal music streaming player" />
    <meta property="og:image" content="/android-chrome-512x512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Soundwave" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Soundwave" />
    <meta name="twitter:description" content="Your personal music streaming player" />
    <meta name="twitter:image" content="/android-chrome-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
